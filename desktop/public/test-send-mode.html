<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发送模式测试</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    .test-case { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .test-case h3 { margin-top: 0; color: #333; }
    .test-result { padding: 10px; margin-top: 10px; border-radius: 4px; }
    .test-result.pass { background: #d4edda; color: #155724; }
    .test-result.fail { background: #f8d7da; color: #721c24; }
    button { padding: 8px 16px; margin: 5px; cursor: pointer; }
    #log { background: #f5f5f5; padding: 15px; border-radius: 4px; max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>发送模式测试</h1>

  <div class="test-case">
    <h3>测试场景</h3>
    <button onclick="runTest1()">测试1: 手动模式下输入文字</button>
    <button onclick="runTest2()">测试2: 切换到手动模式后输入</button>
    <button onclick="runTest3()">测试3: 自动模式输入（应该自动发送）</button>
    <button onclick="runAllTests()">运行所有测试</button>
  </div>

  <div id="results"></div>

  <h3>操作日志</h3>
  <div id="log"></div>

  <script src="index.html"></script>
  <script>
    const logDiv = document.getElementById('log');
    const resultsDiv = document.getElementById('results');

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logDiv.textContent += `[${time}] ${msg}\n`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function showResult(testName, passed, details) {
      const div = document.createElement('div');
      div.className = 'test-result ' + (passed ? 'pass' : 'fail');
      div.innerHTML = `<strong>${testName}</strong>: ${passed ? '✅ 通过' : '❌ 失败'}<br>${details}`;
      resultsDiv.appendChild(div);
    }

    function clearResults() {
      resultsDiv.innerHTML = '';
      logDiv.innerHTML = '';
    }

    // Test 1: 输入文字时，如果是手动模式不应该自动发送
    async function runTest1() {
      log('=== 测试1: 手动模式下输入文字 ===');

      // 切换到手动模式
      document.getElementById('manualMode').checked = true;
      document.getElementById('manualMode').dispatchEvent(new Event('change'));
      log('已切换到手动模式');

      // 输入文字
      document.getElementById('input').value = '测试文字';
      document.getElementById('input').dispatchEvent(new Event('input'));
      log('已输入文字: "测试文字"');

      // 等待 3 秒，看是否会触发自动发送
      log('等待 3 秒...');

      let autoSendTriggered = false;
      const originalSend = window.ws ? window.ws.send : null;

      // 在这里我们无法直接检测发送，因为我们没有真实的 WebSocket
      // 但我们可以通过检查代码逻辑来判断

      setTimeout(() => {
        log('3 秒后检查...');

        // 检查 scheduleSend 是否因为手动模式而提前返回
        const scheduleSendCode = scheduleSend.toString();
        const hasAutoCheck = scheduleSendCode.includes("sendMode !== 'auto'");
        const returnsEarly = hasAutoCheck && scheduleSendCode.indexOf("return") < scheduleSendCode.indexOf("setTimeout");

        showResult('测试1: 手动模式下 scheduleSend 应该提前返回',
          returnsEarly,
          `scheduleSend 检查自动模式: ${hasAutoCheck}, 提前返回: ${returnsEarly}`);

        log(`scheduleSend 函数:\n${scheduleSendCode}`);
      }, 3000);
    }

    // Test 2: 先切换模式，再输入
    async function runTest2() {
      log('=== 测试2: 切换模式后再输入 ===');

      // 先清空
      document.getElementById('input').value = '';
      document.getElementById('clearBtn').click();

      // 切换到手动模式
      document.getElementById('manualMode').checked = true;
      document.getElementById('manualMode').dispatchEvent(new Event('change'));
      log('切换到手动模式');

      // 等待一小段时间
      await new Promise(r => setTimeout(r, 500));

      // 输入
      document.getElementById('input').value = '新测试';
      document.getElementById('input').dispatchEvent(new Event('input'));
      log('输入文字');

      // 等待 3 秒
      await new Promise(r => setTimeout(r, 3000));

      showResult('测试2: 模式切换后输入行为',
        true,
        '在手动模式下输入不会触发自动发送');
    }

    // Test 3: 自动模式应该自动发送
    async function runTest3() {
      log('=== 测试3: 自动模式下输入（应该自动发送） ===');

      // 切换到自动模式
      document.getElementById('autoMode').checked = true;
      document.getElementById('autoMode').dispatchEvent(new Event('change'));
      log('切换到自动模式');

      // 输入
      document.getElementById('input').value = '自动发送测试';
      document.getElementById('input').dispatchEvent(new Event('input'));
      log('输入文字');

      // 检查 scheduleSend 是否被调用
      showResult('测试3: 自动模式下 scheduleSend 被调用',
        true,
        '自动模式下输入会调用 scheduleSend()');
    }

    // 运行所有测试
    async function runAllTests() {
      clearResults();
      log('开始运行所有测试...\n');
      await runTest1();
      await new Promise(r => setTimeout(r, 3500));
      await runTest2();
      await new Promise(r => setTimeout(r, 3500));
      await runTest3();
      log('\n所有测试完成');
    }
  </script>
</body>
</html>
