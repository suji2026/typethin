<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeThin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 24px;
    }
    h2 { font-size: 16px; margin-bottom: 16px; color: #ccc; }
    #qr-img { width: 260px; height: 260px; border-radius: 12px; background: #16213e; }
    .url {
      margin-top: 16px; font-size: 13px; color: #888;
      word-break: break-all; text-align: center;
      max-width: 280px;
      user-select: all;
    }
    .url-list {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      word-break: break-all;
      text-align: center;
      max-width: 280px;
    }
    .url-list-item {
      margin-top: 4px;
    }
    .url-list-item:first-child {
      margin-top: 0;
    }
    .error { color: #e94560; font-size: 14px; }
    .status {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 500;
      color: #888;
      transition: color 0.2s;
    }
  </style>
</head>
<body>
  <h2>📱 手机扫码连接</h2>
  <img id="qr-img" src="" alt="QR Code">
  <p class="url" id="url-text"></p>
  <div class="url-list" id="url-list"></div>
  <p class="status" id="status">等待连接...</p>
  <p class="error" id="error" style="display:none"></p>

  <script>
    function updateStatus() {
      fetch('/api/qr')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          document.getElementById('qr-img').src = data.dataUrl;
          document.getElementById('url-text').textContent = data.url;
          
          var urlListEl = document.getElementById('url-list');
          if (data.allIPs && data.allIPs.length > 1) {
            var otherIPs = data.allIPs.filter(function(ip) {
              return !data.url.includes(ip);
            });
            if (otherIPs.length > 0) {
              urlListEl.innerHTML = otherIPs.map(function(ip) {
                return '<div class="url-list-item">或: http://' + ip + ':9527</div>';
              }).join('');
              urlListEl.style.display = 'block';
            } else {
              urlListEl.style.display = 'none';
            }
          } else {
            urlListEl.style.display = 'none';
          }
          
          var statusEl = document.getElementById('status');
          if (data.connected) {
            statusEl.textContent = '已连接 ✓';
            statusEl.style.color = '#4ade80';
          } else {
            statusEl.textContent = '等待连接...';
            statusEl.style.color = '#888';
          }
        })
        .catch(function(err) {
          document.getElementById('error').style.display = 'block';
          document.getElementById('error').textContent = '生成二维码失败: ' + err.message;
        });
    }
    
    updateStatus();
    setInterval(updateStatus, 1000);
  </script>
</body>
</html>
