<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>发送模式验证测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
      min-height: 100vh;
    }
    h1 {
      color: #e94560;
      margin-bottom: 20px;
      font-size: 24px;
    }
    h2 {
      color: #4ec9b0;
      margin: 20px 0 10px;
      font-size: 18px;
    }
    .test-box {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      padding: 20px;
      margin: 15px 0;
    }
    .mode-selector {
      display: flex;
      gap: 15px;
      margin: 15px 0;
    }
    .mode-selector label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: #0f3460;
      border-radius: 8px;
      cursor: pointer;
      flex: 1;
      justify-content: center;
    }
    .mode-selector input {
      width: 20px;
      height: 20px;
      accent-color: #e94560;
    }
    textarea {
      width: 100%;
      min-height: 100px;
      background: #0f3460;
      color: #eee;
      border: 2px solid #16213e;
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      resize: vertical;
      margin: 10px 0;
    }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }
    .btn-test {
      background: #4ec9b0;
      color: #1a1a2e;
    }
    .btn-send {
      background: #e94560;
      color: white;
    }
    .log {
      background: #0a0a15;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      font-family: monospace;
      font-size: 13px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .log-entry {
      margin: 5px 0;
      padding: 5px;
      border-radius: 4px;
    }
    .log-action { background: #1a3a5c; }
    .log-send { background: #3a5c1a; color: #4ec9b0; }
    .log-result { background: #2a2a4a; }
    .test-result {
      padding: 15px;
      border-radius: 8px;
      margin: 10px 0;
      font-weight: bold;
    }
    .pass { background: #1a4a3a; border: 2px solid #4ec9b0; }
    .fail { background: #4a1a2a; border: 2px solid #e94560; }
  </style>
</head>
<body>
  <h1>🧪 发送模式验证测试</h1>

  <div class="test-box">
    <h2>步骤 1: 测试手动模式</h2>
    <p>选择"手动发送"模式，然后在下方输入文字</p>

    <div class="mode-selector">
      <label>
        <input type="radio" name="mode" value="auto" id="modeAuto">
        自动发送
      </label>
      <label>
        <input type="radio" name="mode" value="manual" id="modeManual" checked>
        手动发送
      </label>
    </div>

    <textarea id="testInput" placeholder="在这里输入测试文字..."></textarea>

    <div>
      <button class="btn-test" onclick="clearLog()">清空日志</button>
      <button class="btn-test" onclick="runFullTest()">运行完整测试</button>
    </div>
  </div>

  <div class="test-box">
    <h2>步骤 2: 查看结果</h2>
    <div id="testResults"></div>
  </div>

  <div class="test-box">
    <h2>操作日志</h2>
    <div id="log" class="log"></div>
  </div>

  <script>
    let mode = 'manual';
    let sendCount = 0;
    let debounceTimer = null;
    let manualSendTimer = null;
    let lastSentText = '';

    const modeAuto = document.getElementById('modeAuto');
    const modeManual = document.getElementById('modeManual');
    const testInput = document.getElementById('testInput');
    const logDiv = document.getElementById('log');
    const resultsDiv = document.getElementById('testResults');

    modeAuto.addEventListener('change', () => {
      mode = 'auto';
      log(`切换到: 自动发送模式`, 'action');
    });

    modeManual.addEventListener('change', () => {
      mode = 'manual';
      log(`切换到: 手动发送模式`, 'action');
    });

    testInput.addEventListener('input', () => {
      const text = testInput.value;
      log(`输入文字: "${text.substring(0, 30)}${text.length > 30 ? '...' : ''}"`, 'action');

      // 模拟修复后的行为
      if (mode === 'auto') {
        log('scheduleSend: 启动 2 秒定时器...', 'action');
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          if (mode === 'auto') {
            doSend(text);
          }
        }, 2000);
      } else {
        log('scheduleSend: 跳过（手动模式）', 'result');
      }
    });

    function doSend(text) {
      if (!text || text === lastSentText) return;
      sendCount++;
      lastSentText = text;
      log(`📤 发送 #${sendCount}: "${text}"`, 'send');
    }

    function log(message, type = 'action') {
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = `[${time}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function clearLog() {
      logDiv.innerHTML = '';
      resultsDiv.innerHTML = '';
      log('日志已清空');
    }

    async function runFullTest() {
      clearLog();
      log('='.repeat(40), 'result');
      log('🚀 开始完整测试', 'action');
      log('='.repeat(40), 'result');

      // 重置状态
      sendCount = 0;
      lastSentText = '';
      clearTimeout(debounceTimer);
      clearTimeout(manualSendTimer);
      testInput.value = '';
      modeManual.checked = true;
      mode = 'manual';

      // 测试 1: 手动模式输入
      log('\n--- 测试 1: 手动模式输入 ---', 'action');
      mode = 'manual';
      testInput.value = '测试手动模式';
      testInput.dispatchEvent(new Event('input'));

      log('等待 3 秒...', 'action');
      await new Promise(r => setTimeout(r, 3000));

      const test1Pass = sendCount === 0;
      log(`发送次数: ${sendCount}, 期望: 0`, test1Pass ? 'result' : 'send');
      resultsDiv.innerHTML = `<div class="test-result ${test1Pass ? 'pass' : 'fail'}">
        测试 1: 手动模式不应自动发送
        ${test1Pass ? '✅ 通过' : `❌ 失败 (发送了 ${sendCount} 次)`}
      </div>`;

      // 测试 2: 手动模式手动发送
      log('\n--- 测试 2: 手动模式点击发送 ---', 'action');
      doSend('手动点击发送');
      const test2Pass = sendCount === 1;
      resultsDiv.innerHTML += `<div class="test-result ${test2Pass ? 'pass' : 'fail'}">
        测试 2: 手动发送应成功
        ${test2Pass ? '✅ 通过' : '❌ 失败'}
      </div>`;

      // 测试 3: 自动模式
      log('\n--- 测试 3: 自动模式 ---', 'action');
      modeAuto.checked = true;
      mode = 'auto';
      testInput.value = '';
      clearTimeout(debounceTimer);

      testInput.value = '自动模式测试';
      testInput.dispatchEvent(new Event('input'));

      log('等待 3 秒...', 'action');
      await new Promise(r => setTimeout(r, 3000));

      const test3Pass = sendCount >= 2;
      resultsDiv.innerHTML += `<div class="test-result ${test3Pass ? 'pass' : 'fail'}">
        测试 3: 自动模式应自动发送
        ${test3Pass ? '✅ 通过' : `❌ 失败 (总发送: ${sendCount})`}
      </div>`;

      log('\n' + '='.repeat(40), 'result');
      log('🏁 测试完成', 'action');
      log(`总发送次数: ${sendCount}`, 'result');
      log('='.repeat(40), 'result');
    }

    // 初始化
    log('测试页面已加载');
    log('请先运行"完整测试"验证修复');
  </script>
</body>
</html>
