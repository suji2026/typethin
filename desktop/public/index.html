<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>语音输入</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      padding: 16px;
    }
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 0;
      font-size: 14px;
      color: #aaa;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.disconnected { background: #ff4444; }
    .dot.connecting  { background: #ffaa00; animation: pulse 1s infinite; }
    .dot.connected   { background: #44ff44; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }
    textarea {
      width: 100%;
      height: 28vh;
      background: #16213e;
      color: #eee;
      border: 2px solid #0f3460;
      border-radius: 12px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.6;
      resize: none;
      outline: none;
      -webkit-appearance: none;
    }
    textarea:focus {
      border-color: #e94560;
    }
    textarea::placeholder {
      color: #555;
    }
    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding: 0 4px;
    }
    .send-mode {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: #888;
    }
    .send-mode label {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .send-mode input[type="radio"] {
      accent-color: #e94560;
    }
    .action-btns {
      display: flex;
      gap: 8px;
    }
    .action-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn.clear {
      background: #333;
      color: #aaa;
    }
    .action-btn.clear:hover {
      background: #444;
    }
    .action-btn.send {
      background: #2196F3;
      color: #fff;
    }
    .action-btn.send:hover {
      background: #1976D2;
    }
    .action-btn.send:disabled {
      background: #555;
      color: #888;
      cursor: not-allowed;
    }
    .tips {
      text-align: left;
      color: #555;
      font-size: 12px;
      padding: 12px 0 4px;
      line-height: 1.8;
    }
    .refresh-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: #888;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: none;
    }
    .refresh-btn:hover {
      color: #aaa;
    }
    .refresh-btn:active {
      transform: scale(0.95);
    }
    .refresh-btn.refreshing {
      animation: spin 0.5s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <button class="refresh-btn" id="refreshBtn" title="刷新连接">↻</button>
  <div class="status-bar">
    <div class="dot disconnected" id="dot"></div>
    <span id="statusText">未连接</span>
  </div>

  <textarea id="input"
    placeholder="点击此处，切换到语音输入法开始说话..."
    autofocus></textarea>

  <div class="bottom-bar">
    <div class="send-mode">
      <label>
        <input type="radio" name="sendMode" value="auto" id="autoMode">
        自动发送
      </label>
      <label>
        <input type="radio" name="sendMode" value="manual" id="manualMode" checked>
        手动发送
      </label>
    </div>
    <div class="action-btns">
      <button class="action-btn clear" id="clearBtn">清空</button>
      <button class="action-btn send" id="sendBtn" disabled>发送</button>
    </div>
  </div>

  <div class="tips">
    <div>①自动发送：输入框内不再新增文字2秒后自动发送</div>
    <div>②手动发送：点击发送按钮发送</div>
    <div>③文字发送到电脑的光标处自动粘贴，光标未唤起时可在电脑端剪贴板中查看</div>
  </div>

  <script>
    (function() {
      var dot = document.getElementById('dot');
      var statusText = document.getElementById('statusText');
      var textarea = document.getElementById('input');
      var ws = null;
      var retries = 0;
      var lastSentText = '';
      var autoSendTimer = null;
      var sendMode = 'manual';

      function setStatus(state) {
        dot.className = 'dot ' + state;
        statusText.textContent = {
          disconnected: '未连接',
          connecting: '连接中...',
          connected: '已连接'
        }[state];
      }

      function connect() {
        if (ws && ws.readyState === WebSocket.OPEN) return;
        setStatus('connecting');

        var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(protocol + '//' + location.host);

        ws.onopen = function() {
          setStatus('connected');
          retries = 0;
          textarea.focus();
        };

        ws.onclose = function() {
          setStatus('disconnected');
          var delay = Math.min(1000 * Math.pow(2, Math.min(retries, 5)), 30000);
          retries++;
          setTimeout(connect, delay);
        };

        ws.onerror = function() {
          ws.close();
        };

        ws.onmessage = function(e) {
          try {
            var msg = JSON.parse(e.data);
            if (msg.type === 'ack') {
            }
          } catch (ignore) {}
        };
      }

      function sendText(text) {
        if (!text || text === lastSentText) return;
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'text', payload: text }));
          lastSentText = text;
          textarea.value = '';
          updateSendBtn();
        }
      }

      function updateSendBtn() {
        var sendBtn = document.getElementById('sendBtn');
        var hasText = textarea.value.trim().length > 0;
        sendBtn.disabled = !hasText;
      }

      function handleInput() {
        updateSendBtn();
        if (sendMode === 'auto') {
          clearTimeout(autoSendTimer);
          autoSendTimer = setTimeout(function() {
            sendText(textarea.value.trim());
          }, 2000);
        }
      }

      function handleModeChange(mode) {
        sendMode = mode;
        clearTimeout(autoSendTimer);
      }

      function handleClear() {
        textarea.value = '';
        lastSentText = '';
        updateSendBtn();
        clearTimeout(autoSendTimer);
      }

      function handleManualSend() {
        if (sendMode === 'manual') {
          sendText(textarea.value.trim());
        }
      }

      textarea.addEventListener('input', handleInput);

      document.getElementById('autoMode').addEventListener('change', function() {
        handleModeChange('auto');
      });

      document.getElementById('manualMode').addEventListener('change', function() {
        handleModeChange('manual');
      });

      document.getElementById('clearBtn').addEventListener('click', handleClear);

      document.getElementById('sendBtn').addEventListener('click', handleManualSend);

      setInterval(function() {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'ping' }));
        }
      }, 30000);

      connect();

      var refreshBtn = document.getElementById('refreshBtn');
      refreshBtn.addEventListener('click', function() {
        refreshBtn.classList.add('refreshing');
        if (ws) {
          ws.close();
        }
        retries = 0;
        setTimeout(function() {
          connect();
          setTimeout(function() {
            refreshBtn.classList.remove('refreshing');
          }, 500);
        }, 200);
      });
    })();
  </script>
</body>
</html>
